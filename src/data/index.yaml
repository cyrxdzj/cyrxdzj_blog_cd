    summary: 状态压缩DP是一种用二进制数表示集合、结合位运算处理动态规划问题的技巧，适用于元素状态少（如选/不选）的场景。本文通过三个例题（互不侵犯、炮兵阵地、宝藏）说明了其状态定义、合法性判断、转移方程和复杂度分析。
